<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Boot Sense Wiring Diagram</title>
  <desc>Schematic showing two load cells wired to an HX711 amplifier, connected to an Arduino MKR WiFi 1010, which drives a coin vibration motor and LED indicator.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#ffffff"/>

  <!-- ── Load Cell 1 ── -->
  <rect x="30" y="60" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="95" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#085041">Load Cell 1</text>
  <text x="95" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Heel sensor</text>

  <!-- ── Load Cell 2 ── -->
  <rect x="30" y="160" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="95" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#085041">Load Cell 2</text>
  <text x="95" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Forefoot sensor</text>

  <!-- Wires: load cells to HX711 -->
  <line x1="160" y1="88" x2="218" y2="130" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="188" x2="218" y2="162" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="178" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">E+/E−</text>
  <text x="178" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">A+/A−</text>

  <!-- ── HX711 ── -->
  <rect x="220" y="110" width="130" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="285" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#633806">HX711</text>
  <text x="285" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#854F0B">Instrumentation amp</text>
  <text x="285" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">⚠ Power at 3.3V only!</text>

  <!-- Wire: HX711 to Arduino -->
  <line x1="350" y1="144" x2="398" y2="144" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="374" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">DOUT → A5</text>
  <text x="374" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">SCK → A3</text>

  <!-- ── Arduino MKR WiFi 1010 ── -->
  <rect x="400" y="80" width="160" height="130" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="480" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#26215C">Arduino MKR</text>
  <text x="480" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#26215C">WiFi 1010</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#534AB7">SAMD microcontroller</text>
  <text x="480" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#534AB7">3.3V / 5V pins</text>

  <!-- Wire: Arduino to Vibrator -->
  <line x1="560" y1="112" x2="610" y2="112" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="584" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Pin 6</text>

  <!-- Wire: Arduino to LED -->
  <line x1="560" y1="168" x2="610" y2="168" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="584" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Pin 7</text>

  <!-- ── Coin Vibrator ── -->
  <rect x="612" y="86" width="54" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="639" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#712B13">Vibrator</text>
  <text x="639" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#993C1D">Coin motor</text>

  <!-- ── LED ── -->
  <rect x="612" y="146" width="54" height="46" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="639" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27500A">LED</text>
  <text x="639" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3B6D11">220Ω to GND</text>

  <!-- ── Battery ── -->
  <rect x="400" y="282" width="130" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="465" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2A">Battery pack</text>
  <text x="465" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Rechargeable Li-ion</text>
  <!-- Wire: Battery to Arduino -->
  <line x1="465" y1="282" x2="465" y2="212" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="476" y="252" font-family="Arial, sans-serif" font-size="10" fill="#555">Power</text>

  <!-- ── Alert Algorithm box ── -->
  <rect x="220" y="312" width="150" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="295" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#042C53">Alert algorithm</text>
  <text x="295" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#185FA5">ON ≥ 30% BW</text>
  <text x="295" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#185FA5">OFF ≤ 20% BW</text>
  <text x="295" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#185FA5">Hold: 300 ms</text>
  <!-- Dashed link: Algorithm to Arduino -->
  <path d="M370 357 L400 357 L400 212" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="407" y="348" font-family="Arial, sans-serif" font-size="10" fill="#555">Runs on</text>

  <!-- ── Calibration box ── -->
  <rect x="30" y="312" width="155" height="90" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="107" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2A">Calibration</text>
  <text x="107" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">EMPTY = no load</text>
  <text x="107" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">STAND = full BW</text>
  <text x="107" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">%BW = linear map</text>
  <!-- Dashed link: Calibration to HX711 -->
  <path d="M107 312 L107 262 L285 262 L285 210" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="196" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Scales ADC output</text>

  <!-- ── Legend ── -->
  <rect x="30" y="438" width="620" height="64" rx="6" fill="#f9f9f7" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="44" y="456" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2A">Legend</text>
  <line x1="44" y1="472" x2="80" y2="472" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="86" y="476" font-family="Arial, sans-serif" font-size="11" fill="#333">Signal wire</text>
  <line x1="190" y1="472" x2="226" y2="472" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="232" y="476" font-family="Arial, sans-serif" font-size="11" fill="#333">Logic / software link</text>
  <text x="44" y="494" font-family="Arial, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">⚠ HX711 must be powered at 3.3V — NOT 5V. Using 5V will damage the module.</text>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2C2C2A">Boot Sense — Wiring Diagram</text>
  <text x="340" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">University of Toledo BIOE 4420 | Arduino MKR WiFi 1010 + HX711 + 2x Load Cells</text>
</svg>
